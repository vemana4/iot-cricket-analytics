kind = "web"
previewPath = "/"
title = "QuantumPitch AI"
version = "1.0.0"
id = "artifacts/quantum-pitch"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21550

[services.development]
run = "pnpm --filter @workspace/quantum-pitch run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/quantum-pitch", "run", "build" ]
publicDir = "artifacts/quantum-pitch/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21550"
BASE_PATH = "/"
